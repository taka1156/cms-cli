      <linearGradient id="sparkL" x1="52" y1="8" x2="92" y2="56" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#7dd6f8"/>
        <stop offset="100%" stop-color="#2d8fe8"/>
